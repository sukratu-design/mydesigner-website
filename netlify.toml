[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"

# Force clean URLs: redirect .html to extensionless (except index.html files)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# Portfolio category rewrites (clean URL → .html file)
[[redirects]]
  from = "/portfolio/ui-ux-design"
  to = "/portfolio/ui-ux-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/web-development"
  to = "/portfolio/web-development.html"
  status = 200

[[redirects]]
  from = "/portfolio/graphic-design"
  to = "/portfolio/graphic-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/branding"
  to = "/portfolio/branding.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/humanized-blogs/*"
  to = "/404.html"
  status = 404

# Block internal docs from public access
[[redirects]]
  from = "/CONTENT-STRATEGY.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/HANDOVER.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/mydesigner-meta-descriptions.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/content/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
