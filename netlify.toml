[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # 'unsafe-eval' + aichatassist domains are required by the AI assist bot.
    # admin.aichatassist.com hosts media assets (notification sounds etc.).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://identity.netlify.com https://unpkg.com https://traffic.sukratu-test.com https://aichatassist.pages.dev https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://aichatassist.pages.dev; img-src 'self' https: data:; font-src 'self' https:; media-src 'self' https://admin.aichatassist.com https://aichatassist.pages.dev; connect-src 'self' https://api.convertkit.com https://www.google-analytics.com https://region1.google-analytics.com https://www.google.com https://traffic.sukratu-test.com https://aichatassist.pages.dev https://admin.aichatassist.com https://connect.facebook.net https://www.facebook.com https://api.ipify.org https://api64.ipify.org; frame-src https://calendar.app.google https://aichatassist.pages.dev; frame-ancestors 'self'"

# .html → clean URL redirects (to avoid duplicate content in Google)
# are now handled by the edge function at netlify/edge-functions/redirect-html.js.
# The _redirects file only contains the www → non-www domain redirect.

# ORBIT transition rewrites (temporary until the physical root swap phase)
[[redirects]]
  from = "/"
  to = "/story/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/story/about.html"
  status = 200

[[redirects]]
  from = "/work"
  to = "/story/work.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/story/services.html"
  status = 200

# Portfolio category rewrites (clean URL → .html file)
[[redirects]]
  from = "/portfolio/ui-ux-design"
  to = "/portfolio/ui-ux-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/web-development"
  to = "/portfolio/web-development.html"
  status = 200

[[redirects]]
  from = "/portfolio/graphic-design"
  to = "/portfolio/graphic-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/branding"
  to = "/portfolio/branding.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/humanized-blogs/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/locations/*"
  to = "/services"
  status = 301

# Block internal docs and config from public access
[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*.report.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/content/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
