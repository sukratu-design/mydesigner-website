[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://identity.netlify.com https://unpkg.com https://esm.sh; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' https: data:; font-src 'self' https:; connect-src 'self' https://api.convertkit.com https://www.google-analytics.com https://region1.google-analytics.com https://www.google.com; frame-src https://calendar.app.google; frame-ancestors 'self'"

# Force clean URLs: redirect .html to extensionless (except index.html files)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# Portfolio category rewrites (clean URL → .html file)
[[redirects]]
  from = "/portfolio/ui-ux-design"
  to = "/portfolio/ui-ux-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/web-development"
  to = "/portfolio/web-development.html"
  status = 200

[[redirects]]
  from = "/portfolio/graphic-design"
  to = "/portfolio/graphic-design.html"
  status = 200

[[redirects]]
  from = "/portfolio/branding"
  to = "/portfolio/branding.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/humanized-blogs/*"
  to = "/404.html"
  status = 404

# Block internal docs and config from public access
[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*.report.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/content/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
